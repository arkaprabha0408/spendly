{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <div class="add-expense-icon">
        <i data-lucide="receipt"></i>
      </div>
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Record a new expense to your account.</p>
    </div>

    <div class="auth-card">
      {% if error %}
        <div class="auth-error">
          <i data-lucide="alert-circle" class="add-expense-error-icon"></i>
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input
            class="form-input"
            type="number"
            id="amount"
            name="amount"
            step="0.01"
            min="0.01"
            placeholder="0.00"
            value="{{ form.get('amount', '') }}"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select class="form-input" id="category" name="category" required>
            <option value="" disabled {% if not form.get('category') %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
              <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input
            class="form-input"
            type="date"
            id="date"
            name="date"
            value="{{ form.get('date', today) }}"
            required
          >
        </div>

        <div class="form-group">
          <label for="description">
            Description
            <span class="add-expense-optional">(optional)</span>
          </label>
          <input
            class="form-input"
            type="text"
            id="description"
            name="description"
            placeholder="e.g. Lunch with team"
            value="{{ form.get('description', '') }}"
            maxlength="200"
          >
        </div>

        <button class="btn-submit" type="submit">
          <i data-lucide="plus-circle" class="add-expense-btn-icon"></i>
          Save Expense
        </button>

      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('profile') }}">← Cancel</a>
    </p>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  lucide.createIcons();
  document.getElementById('amount').addEventListener('keydown', function(e) {
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      const val = parseFloat(this.value) || 0;
      const next = e.key === 'ArrowUp' ? val + 1 : val - 1;
      this.value = Math.max(0, next).toFixed(2);
    }
  });
</script>
{% endblock %}
